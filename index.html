<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Neha 🎂</title>

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:black;
color:white;
overflow-x:hidden;
cursor:none;
}

/* CURSOR GLOW */
.cursor{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
background:rgba(255,255,255,0.8);
pointer-events:none;
transform:translate(-50%,-50%);
mix-blend-mode: difference;
transition:0.1s;
z-index:9999;
}

/* PARALLAX BG */
.bg{
position:fixed;
width:120%;
height:120%;
background:radial-gradient(circle,#ff4d6d,#000);
z-index:-2;
transform:translate(-10%,-10%);
}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
font-size:30px;
}

/* START */
#startScreen{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

/* BUTTON */
button{
padding:15px 30px;
border-radius:30px;
border:none;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
}

/* SECTION */
.section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:80px 20px;
}

/* GLASS CARD */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
border-radius:20px;
padding:30px;
max-width:600px;
transform-style:preserve-3d;
transition:0.5s;
}
.card:hover{
transform:rotateY(10deg) rotateX(10deg) scale(1.05);
}

/* TYPING */
#typing{
font-size:40px;
}

/* SLIDESHOW */
.slideshow{
width:300px;
height:400px;
position:relative;
}
.slideshow img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
opacity:0;
transition:1s;
}

/* FLOAT HEART */
.float{
position:absolute;
animation:float 6s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* FIREWORK */
.fire{
position:absolute;
width:5px;
height:5px;
background:white;
border-radius:50%;
animation:explode 1s;
}
@keyframes explode{
to{transform:scale(20);opacity:0;}
}

/* PARALLAX MOVE */
.parallax{
transition:transform 0.1s;
}
</style>
</head>

<body>

<div class="cursor"></div>
<div class="bg"></div>

<div id="loader">Loading...</div>

<div id="startScreen" style="display:none;">
<h2>🎁 Open Surprise 🎁</h2>
<button onclick="start()">Start</button>
</div>

<div id="main" style="display:none;">

<div class="section parallax">
<h1 id="typing"></h1>
<div class="card">
<p>You are one of the most amazing person 🌸</p>
</div>
</div>

<div class="section parallax">
<div class="slideshow">
<img src="https://files.catbox.moe/v54y34.jpg">
<img src="https://files.catbox.moe/q70qwb.png">
<img src="https://files.catbox.moe/3iz38h.png">
<img src="https://files.catbox.moe/q61xu3.png">
</div>
</div>

<div class="section parallax">
<div class="card">
<p>May your life always shine like stars ✨</p>
</div>
</div>

</div>

<audio id="music" src="https://files.catbox.moe/2l5t6d.mp3" loop></audio>

<script>
/* CURSOR */
let cursor=document.querySelector(".cursor");
document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* PARALLAX */
document.addEventListener("mousemove",(e)=>{
document.querySelectorAll(".parallax").forEach(el=>{
let x=(window.innerWidth/2-e.clientX)/20;
let y=(window.innerHeight/2-e.clientY)/20;
el.style.transform=`translate(${x}px,${y}px)`;
});
});

/* LOADER */
setTimeout(()=>{
document.getElementById("loader").style.display="none";
document.getElementById("startScreen").style.display="flex";
},2500);

/* START */
function start(){
document.getElementById("startScreen").style.display="none";
document.getElementById("main").style.display="block";

/* MUSIC FADE */
let m=document.getElementById("music");
m.volume=0;
m.play();
let v=0;
let fade=setInterval(()=>{
if(v<1){v+=0.05; m.volume=v;}
},200);

/* TYPING */
let text="🎂 Happy Birthday Neha 🎂";
let i=0;
let t=setInterval(()=>{
document.getElementById("typing").innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(t);
},100);
}

/* SLIDESHOW */
let imgs=document.querySelectorAll(".slideshow img");
let i=0;
setInterval(()=>{
imgs.forEach(im=>im.style.opacity=0);
imgs[i].style.opacity=1;
i=(i+1)%imgs.length;
},2500);

/* FLOAT HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="float";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);

/* FIREWORK */
setInterval(()=>{
let f=document.createElement("div");
f.className="fire";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*100+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
},800);
</script>

</body>
  </html>
