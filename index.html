<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Neha 🎂</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#2b0000,#000);
  color:white;
  text-align:center;
  overflow-x:hidden;
}

/* Typing Heading */
#typing {
  font-size:28px;
  font-weight:bold;
  margin-top:40px;
  min-height:40px;
}

/* Card */
.card {
  margin:20px;
  padding:20px;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  backdrop-filter: blur(10px);
}

/* Images */
.gallery {
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px;
  flex-wrap:wrap;
}
.gallery img {
  width:80px;
  height:80px;
  border-radius:15px;
  object-fit:cover;
}

/* Cake Section */
.cake {
  margin:30px 0;
}
.cake img {
  width:150px;
  animation: float 3s infinite ease-in-out;
}

@keyframes float {
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* Footer text */
.footer {
  margin:20px;
  font-size:14px;
}

/* Music Button */
.music-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff4d6d;
  border:none;
  padding:10px 15px;
  border-radius:20px;
  color:white;
}
</style>

</head>
<body>

<h1 id="typing"></h1>

<div class="card">
  Wishing you endless happiness 🌸<br>
  You deserve all smiles ✨<br><br>
  Stay blessed, stay amazing 💖
</div>

<!-- Images -->
<div class="gallery">
  <img src="https://files.catbox.moe/v54y34.jpg">
  <img src="https://files.catbox.moe/q70qwb.png">
  <img src="https://files.catbox.moe/3iz38h.png">
  <img src="https://files.catbox.moe/q61xu3.png">
</div>

<!-- Cake Section -->
<div class="cake">
  <img src="https://cdn.pixabay.com/photo/2017/01/31/13/14/cake-2028717_1280.png">
  <p>🎂 Happy Birthday Once Again 🎂</p>
</div>

<div class="card">
  🌹 May your dreams shine like stars ⭐<br>
  💫 Keep smiling always Neha 💖
</div>

<div class="footer">
  Made with ❤️ by someone special
</div>

<!-- Music -->
<audio id="music" autoplay loop>
  <source src="https://files.catbox.moe/2l5t6d.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">🔊</button>

<script>
// Typing Effect (FIXED)
let text = "🎂 Happy Birthday Neha Kumari 🎉";
let i = 0;
function typing() {
  if(i < text.length){
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 80);
  }
}
typing();

// Music control
let music = document.getElementById("music");
function toggleMusic(){
  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}
</script>

</body>
    </html>
