<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Neha 🎂</title>

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#000000,#1a001a,#000);
  font-family: 'Segoe UI', sans-serif;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* FULL SCREEN */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

/* TOP */
.top{
  padding-top:20px;
}

#typing{
  font-size:28px;
  font-weight:bold;
  color:#ff4d6d;
}

/* WISH */
.wish{
  padding:10px 20px;
  font-size:16px;
  line-height:1.6;
}

/* IMAGES */
.images{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.images img{
  width:80px;
  height:80px;
  border-radius:15px;
  object-fit:cover;
  box-shadow:0 0 10px pink;
}

/* CAKE */
.cake img{
  width:120px;
  animation:float 3s infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

/* BOTTOM */
.bottom{
  padding-bottom:15px;
  font-size:14px;
}

/* BACKGROUND STARS */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  animation:blink 2s infinite;
}
@keyframes blink{
  0%,100%{opacity:0;}
  50%{opacity:1;}
}
</style>

</head>
<body>

<div class="container">

<!-- TOP -->
<div class="top">
  <h1 id="typing"></h1>
</div>

<!-- MIDDLE -->
<div>
  <div class="wish">
    🌸 Wishing you a day filled with happiness <br>
    ✨ May all your dreams come true <br>
    💖 Keep smiling always Neha 💖
  </div>

  <!-- CAKE -->
  <div class="cake">
    <img src="https://files.catbox.moe/7h6l6d.png">
  </div>

  <!-- IMAGES -->
  <div class="images">
    <img src="https://files.catbox.moe/v54y34.jpg">
    <img src="https://files.catbox.moe/q70qwb.png">
    <img src="https://files.catbox.moe/3iz38h.png">
    <img src="https://files.catbox.moe/q61xu3.png">
  </div>

  <div class="wish">
    🎂 Happy Birthday Once Again 🎂 <br>
    🌟 Stay blessed & keep shining 🌟
  </div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  🌹 Made with pure friendship ❤️
</div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://files.catbox.moe/2l5t6d.mp3" type="audio/mpeg">
</audio>

<script>
// Typing Effect FIX
let text="🎉 Happy Birthday Neha Kumari 🎂";
let i=0;
function typing(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typing,70);
  }
}
typing();

// AUTO MUSIC (best trick)
let music=document.getElementById("music");
window.onload=()=>{
  music.play().catch(()=>{
    document.body.addEventListener("click",()=>{
      music.play();
    },{once:true});
  });
};

// STARS BACKGROUND
for(let i=0;i<80;i++){
  let star=document.createElement("div");
  star.className="star";
  star.style.top=Math.random()*100+"vh";
  star.style.left=Math.random()*100+"vw";
  document.body.appendChild(star);
}
</script>

</body>
</html>
