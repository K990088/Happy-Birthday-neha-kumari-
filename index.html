<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Neha 🎂</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:'Poppins',sans-serif;
background:black;
color:white;
}

/* BG ANIMATION */
.bg{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(45deg,#ff4d6d,#000,#ff758c);
background-size:300% 300%;
animation:bgmove 10s infinite linear;
z-index:-1;
}
@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* CENTER */
.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
padding:10px;
}

/* TYPING */
#typing{
font-size:28px;
margin-bottom:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
}

/* SLIDESHOW */
.slideshow{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:240px;
height:320px;
}
.slideshow img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
opacity:0;
transition:1s;
}

/* FLOAT HEART */
.float{
position:absolute;
animation:float 6s linear infinite;
font-size:20px;
}
@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* FIREWORK */
.fire{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:explode 1s;
}
@keyframes explode{
to{transform:scale(18);opacity:0;}
}

/* TOUCH HEART */
.touchHeart{
position:absolute;
font-size:25px;
animation:pop 1s;
}
@keyframes pop{
to{transform:scale(2);opacity:0;}
}

/* BUTTON */
button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- START -->
<div id="startScreen" class="center">
<h2>🎁 Tap to Open 🎁</h2>
<button onclick="start()">Start</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<div class="center">
<h1 id="typing"></h1>

<div class="card">
<p>
You are truly special 🌸<br>
Stay happy always ✨
</p>
</div>
</div>

<!-- SLIDESHOW -->
<div class="slideshow">
<img src="https://files.catbox.moe/v54y34.jpg">
<img src="https://files.catbox.moe/q70qwb.png">
<img src="https://files.catbox.moe/3iz38h.png">
<img src="https://files.catbox.moe/q61xu3.png">
</div>

</div>

<audio id="music" src="https://files.catbox.moe/2l5t6d.mp3" loop></audio>

<script>

/* START */
function start(){
document.getElementById("startScreen").style.display="none";
document.getElementById("main").style.display="block";

/* MUSIC */
let m=document.getElementById("music");
m.volume=0;
m.play();
let v=0;
setInterval(()=>{
if(v<1){v+=0.05; m.volume=v;}
},200);

/* TYPING */
let text="🎂 Happy Birthday Neha 🎂";
let i=0;
let t=setInterval(()=>{
document.getElementById("typing").innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(t);
},100);
}

/* SLIDESHOW */
let imgs=document.querySelectorAll(".slideshow img");
let i=0;
setInterval(()=>{
imgs.forEach(im=>im.style.opacity=0);
imgs[i].style.opacity=1;
i=(i+1)%imgs.length;
},2500);

/* FLOAT HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="float";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},400);

/* FIREWORK */
setInterval(()=>{
let f=document.createElement("div");
f.className="fire";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*100+"vh";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
},1000);

/* TOUCH EFFECT */
document.addEventListener("touchstart",(e)=>{
let t=document.createElement("div");
t.className="touchHeart";
t.innerHTML="💖";
t.style.left=e.touches[0].clientX+"px";
t.style.top=e.touches[0].clientY+"px";
document.body.appendChild(t);
setTimeout(()=>t.remove(),1000);
});
</script>

</body>
  </html>
