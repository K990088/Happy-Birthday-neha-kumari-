<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neha Birthday</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle,#0a0a0a,#000);
  font-family:sans-serif;
  color:white;
  overflow:hidden;
}

/* OPEN SCREEN */
#openScreen{
  position:fixed;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:10;
}

#openBtn{
  padding:12px 30px;
  background:#ff4d6d;
  border:none;
  border-radius:30px;
  color:white;
  font-size:18px;
  box-shadow:0 0 25px pink;
}

/* MAIN */
#main{
  display:none;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  animation:fade 2s;
}

@keyframes fade{
  from{opacity:0; transform:scale(1.2);}
  to{opacity:1; transform:scale(1);}
}

/* GLASS CARD */
.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:20px;
  width:85%;
  max-width:350px;
  text-align:center;
  box-shadow:0 0 30px rgba(255,0,100,0.3);
}

/* TITLE */
#typing{
  font-size:24px;
  color:#ff4d6d;
  margin-bottom:10px;
}

/* CAKE */
.cake img{
  width:130px;
  margin:15px 0;
  animation:float 3s infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

/* FLOATING IMAGES */
.images{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
}

.images img{
  position:absolute;
  width:70px;
  border-radius:15px;
  animation:move 10s infinite linear;
}

@keyframes move{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-100vh);}
}

/* DIFFERENT POSITIONS */
.img1{left:10%; animation-delay:0s;}
.img2{left:30%; animation-delay:2s;}
.img3{left:60%; animation-delay:4s;}
.img4{left:80%; animation-delay:6s;}
</style>

</head>
<body>

<!-- OPEN -->
<div id="openScreen">
  <h2>🎁 Surprise for You 🎁</h2>
  <button id="openBtn">Open 🎂</button>
</div>

<!-- FLOATING IMAGES -->
<div class="images">
  <img src="https://files.catbox.moe/v54y34.jpg" class="img1">
  <img src="https://files.catbox.moe/q70qwb.png" class="img2">
  <img src="https://files.catbox.moe/3iz38h.png" class="img3">
  <img src="https://files.catbox.moe/q61xu3.png" class="img4">
</div>

<!-- MAIN -->
<div id="main">
  <div class="card">
    <h1 id="typing"></h1>

    <p>
      🌸 Wishing you happiness <br>
      ✨ Stay blessed always <br>
      💖 Keep smiling Neha
    </p>

    <div class="cake">
      <img src="https://files.catbox.moe/7h6l6d.png">
    </div>

    <p>
      🎂 Happy Birthday 🎂 <br>
      🌟 Shine forever 🌟
    </p>
  </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://files.catbox.moe/2l5t6d.mp3">
</audio>

<script>

// OPEN
document.getElementById("openBtn").onclick=()=>{
  document.getElementById("openScreen").style.display="none";
  document.getElementById("main").style.display="flex";
  document.getElementById("music").play();
  startTyping();
};

// TYPING
function startTyping(){
let text="🎉 Happy Birthday Neha Kumari 🎂";
let i=0;
function typing(){
  if(i<text.length){
    document.getElementById("typing").innerHTML+=text.charAt(i);
    i++;
    setTimeout(typing,70);
  }
}
typing();
}
</script>

</body>
  </html>
